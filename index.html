<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <button id="theme-btn">🌙</button>

    <button id="pause-btn">⏸️ Pause</button>

    <h1>Simon says Game</h1>
    <h2>Press any key to start the game</h2>

    <h3 id="lives">❤️❤️❤️</h3>
    
    <div class="btn-container">
        <div class="line-one">
            <div class="btn red" type="button" id="red">1</div>
            <div class="btn blue" type="button" id="blue">2</div>
        </div>
        <div class="line-two">
            <div class="btn yellow" type="button" id="yellow">3</div>
            <div class="btn green" type="button" id="green">4</div>
            
        </div>
        
    </div>

    <script src="simonGame.js"></script>
</body>
</html>
